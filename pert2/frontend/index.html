<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aplikasi Mahasiswa</title>

    <!-- Bootstrap 5 CDN -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- CSS Custom -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container utama -->
    <div class="container py-5">

        <!-- Judul -->
        <div class="text-center mb-5">
            <h1 class="main-title">
                Student Management System
            </h1>

            <p class="subtitle">
                Belajar CRUD menggunakan Fetch API + Bootstrap 5
            </p>
        </div>

        <!-- Alert -->
        <div id="alert-box"></div>

        <!-- Row Bootstrap -->
        <div class="row g-4">

            <!-- ========================= -->
            <!-- KOLOM FORM -->
            <!-- ========================= -->
            <div class="col-lg-4">

                <div class="card custom-card form-card">

                    <div class="card-body">

                        <h3 class="mb-4">
                            Tambah Mahasiswa
                        </h3>

                        <!-- Form -->
                        <form id="student-form">

                            <!-- Nama -->
                            <div class="mb-3">
                                <label class="form-label">
                                    Nama Mahasiswa
                                </label>

                                <input
                                    type="text"
                                    id="name"
                                    class="form-control custom-input"
                                    placeholder="Contoh: Alice"
                                    required
                                >
                            </div>

                            <!-- Usia -->
                            <div class="mb-3">
                                <label class="form-label">
                                    Usia
                                </label>

                                <input
                                    type="number"
                                    id="age"
                                    class="form-control custom-input"
                                    placeholder="Contoh: 20"
                                    required
                                >
                            </div>

                            <!-- Nilai -->
                            <div class="mb-4">
                                <label class="form-label">
                                    Nilai
                                </label>

                                <select
                                    id="grade"
                                    class="form-select custom-input"
                                    required
                                >
                                    <option value="">
                                        Pilih Nilai
                                    </option>

                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>

                            <!-- Tombol -->
                            <button 
                                type="submit" 
                                class="btn custom-btn w-100"
                            >
                                Tambah Mahasiswa
                            </button>

                        </form>

                    </div>
                </div>

            </div>

            <!-- ========================= -->
            <!-- KOLOM DATA -->
            <!-- ========================= -->
            <div class="col-lg-8">

                <div class="card custom-card">

                    <div class="card-body">

                        <!-- Header tabel -->
                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <h3 class="mb-0">
                                Data Mahasiswa
                            </h3>

                            <!-- Badge jumlah data -->
                            <span class="badge bg-primary fs-6">
                                List Data
                            </span>

                        </div>

                        <!-- Table responsive -->
                        <div class="table-responsive">

                            <table class="table custom-table align-middle">

                                <!-- Header -->
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nama</th>
                                        <th>Usia</th>
                                        <th>Nilai</th>
                                    </tr>
                                </thead>

                                <!-- Isi tabel -->
                                <tbody id="student-table-body">

                                </tbody>

                            </table>

                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- File JS -->
    <script src="app.js"></script>

</body>
</html>
